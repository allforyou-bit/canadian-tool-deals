<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canadian Tool Deals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; color: #64748b; margin-top: 1px; }

    /* Search */
    .search-wrap { padding: 12px 16px; background: #0f172a; border-bottom: 1px solid #1e293b; }
    .search-row { display: flex; gap: 6px; }
    input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }
    button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* Popular chips */
    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .chip {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      cursor: pointer;
    }
    .chip:hover { border-color: #3b82f6; color: #93c5fd; }

    /* Results */
    .results { padding: 10px 16px 16px; max-height: 380px; overflow-y: auto; }
    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    /* Savings banner */
    .savings {
      background: linear-gradient(135deg, #052e16, #14532d);
      border: 1px solid #166534;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .savings .label { font-size: 10px; color: #86efac; font-weight: 600; text-transform: uppercase; }
    .savings .amount { font-size: 20px; font-weight: 900; color: #4ade80; }
    .savings .detail { font-size: 10px; color: #86efac; margin-top: 1px; }
    .savings .pct { font-size: 28px; font-weight: 900; color: #22c55e; }

    /* Price rows */
    .price-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      margin-bottom: 6px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .price-row:hover { border-color: #3b82f6; background: #1e293b; }
    .price-row.best { border-color: #22c55e; background: #052e16; }

    .rank {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      background: #1e293b;
      color: #64748b;
      flex-shrink: 0;
    }
    .rank.best { background: #22c55e; color: #052e16; }

    .store-name { font-size: 12px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-name { font-size: 10px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    .badges { display: flex; gap: 4px; flex-shrink: 0; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
    }
    .badge.discount { background: #450a0a; color: #f87171; }
    .badge.best { background: #14532d; color: #4ade80; }
    .badge.manual { background: #1e293b; color: #475569; border: 1px solid #334155; }

    .price-wrap { text-align: right; flex-shrink: 0; min-width: 70px; }
    .price { font-size: 16px; font-weight: 900; color: #f1f5f9; }
    .price.best { color: #4ade80; }
    .price.manual { font-size: 12px; color: #475569; }
    .was-price { font-size: 10px; color: #475569; text-decoration: line-through; }

    /* Section header */
    .section-label { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 6px; }

    /* Loading */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 16px; gap: 12px;
    }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      animation: bounce 0.8s infinite alternate;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { from { transform: translateY(0); opacity: 0.4; } to { transform: translateY(-6px); opacity: 1; } }
    .loading p { font-size: 12px; color: #64748b; }

    /* Empty */
    .empty { text-align: center; padding: 24px; color: #475569; }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }

    /* Website link */
    .website-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      font-size: 11px;
      color: #475569;
      text-decoration: none;
      border-top: 1px solid #1e293b;
    }
    .website-link:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:22px">🍁</span>
    <div>
      <h1>Canadian Tool Deals</h1>
      <p>Live prices from 6 Canadian stores</p>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input id="q" type="text" placeholder='e.g. "Milwaukee M18 drill"' />
      <button id="btn">Search</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="content"></div>

  <a class="website-link" href="https://canadian-tool-deals.vercel.app" target="_blank">
    🌐 Open full website
  </a>

  <script src="popup.js"></script>
</body>
</html>
