name: Daily Price Scrape

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC = 4am EST daily
  workflow_dispatch:        # manual trigger anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scrape.mjs

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cache/
          git diff --staged --quiet || git commit -m "chore: update price cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
